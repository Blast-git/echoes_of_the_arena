name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Code style (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ training/ \
            --max-line-length=120 \
            --exclude=__pycache__,venv \
            --ignore=E501,W503,E302,E303,W291,W293,F401,E711,E712,E128,E126 \
            --exit-zero

  test:
    name: Model smoke tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest numpy torch scikit-learn streamlit

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v

      - name: Smoke test - check source files exist
        run: |
          python -c "import os; assert os.path.exists('src/state_manager.py'), 'Missing state_manager.py'"
          python -c "import os; assert os.path.exists('src/rl_overseer.py'), 'Missing rl_overseer.py'"
          python -c "import os; assert os.path.exists('src/rl_gladiator.py'), 'Missing rl_gladiator.py'"
          echo "All critical source files present"