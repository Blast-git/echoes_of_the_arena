name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Code style (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Blast-git/echoes_of_the_arena.git .

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ training/ \
            --max-line-length=120 \
            --exclude=__pycache__,venv \
            --ignore=E501,W503,E302,E303,E501,W291,W293,F401,E711,E712,W503,E128,E126

  test:
    name: Model smoke tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Blast-git/echoes_of_the_arena.git .

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest numpy torch scikit-learn streamlit

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_models.py
        
      - name: Smoke test - check files exist
        run: |
          python -c "import os; assert os.path.exists('src/state_manager.py'), 'Missing state_manager.py'"
          python -c "import os; assert os.path.exists('src/rl_overseer.py'), 'Missing rl_overseer.py'"
          python -c "import os; assert os.path.exists('src/rl_gladiator.py'), 'Missing rl_gladiator.py'"
          python -c "import os; assert os.path.exists('models/overseer_model.pth'), 'Missing overseer_model.pth'"
          echo "All critical files present"